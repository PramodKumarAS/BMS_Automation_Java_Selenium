version: "3.8"

services:

  chrome:
    image: selenium/node-chrome:4.45.0
    container_name: chrome-node
    shm_size: 2gb
    environment:
      - SE_EVENT_BUS_HOST=192.168.1.7
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
      - SE_NODE_HOST=192.168.1.3

  firefox:
    image: selenium/node-firefox:4.45.0
    container_name: firefox-node
    shm_size: 2gb
    environment:
      - SE_EVENT_BUS_HOST=192.168.1.7
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
      - SE_NODE_HOST=192.168.1.3