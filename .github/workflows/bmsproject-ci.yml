name: BMSProject Selenium Grid + Docker CI/CD

on:
  workflow_dispatch:

jobs:
  selenium-tests:
    name: Run Tests in Selenium Grid + Docker
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout BMSProject code
      - name: Checkout Repository
        uses: actions/checkout@v4

       #2. Java 8 — matches your pom.xml maven.compiler.source=1.8
      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      #3. Spin up docker
      - name: Start Selenium Grid
        run : docker compose up -d

      - name: Check Hub Status
        run: |
          curl http://localhost:4444/status || true

      - name: Wait for Selenium Grid
        run: |
          timeout 60 bash -c '
            until curl -s http://localhost:4444/status | grep -q "\"ready\": *true"
            do
              echo "Waiting..."
              sleep 2
            done
          '

      # 4. Cache ~/.m2 (Selenium 4.21, RestAssured 5.4, Allure, MongoDB, Extent etc.)
      - name: Cache Maven Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # 5. Run testng.xml suite — headless=true picked up by BaseTest ChromeOptions
      - name: Run TestNG Suite (testng.xml)
        run: mvn clean test -Dheadless=true
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
          # API_BASE_URL: ${{ secrets.API_BASE_URL }}

      # 7. Generate Allure HTML report
      - name: Generate Allure Report
        uses: simple-elf/allure-report-action@master
        if: always()
        with:
          allure_results: target/allure-results
          allure_history: allure-history
          keep_reports: 20

      # 11. Upload raw Allure results
      - name: Upload Allure Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results
          path: target/allure-results/
          retention-days: 30

      # 12. Upload Extent Reports (adjust path if you save them elsewhere)
      - name: Upload Extent Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: extent-reports
          path: |
            reports/
            ExtentReports/
            test-output/ExtentReport*.html
          retention-days: 30

      - name: Stop Selenium Grid
        if: always()
        run : docker compose down