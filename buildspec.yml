version: 0.2

phases:
  install:
    runtime-versions:
      java: corretto21

    commands:
      - echo "===== Checking Docker ====="
      - docker --version
      - docker compose version
      - java -version

  pre_build:
    commands:
      - echo "===== Starting Selenium Grid ====="
      - docker compose up -d

      - echo "===== Docker Containers ====="
      - docker ps -a

      - echo "===== Docker Compose Status ====="
      - docker compose ps

      - echo "===== Waiting for Selenium Grid ====="
      - |
        for i in {1..60}
        do
          echo "=============================="
          echo "Attempt: $i"
          echo "=============================="

          STATUS=$(curl -s http://localhost:4444/status || true)

          echo "$STATUS"

          if echo "$STATUS" | grep -q '"ready"[[:space:]]*:[[:space:]]*true'; then
            echo "✅ Selenium Grid is READY!"
            break
          fi

          sleep 5
        done

      - echo "===== Final Hub Status ====="
      - |
        STATUS=$(curl -s http://localhost:4444/status || true)
        echo "$STATUS"

        if ! echo "$STATUS" | grep -q '"ready"[[:space:]]*:[[:space:]]*true'; then
          echo "❌ ERROR: Selenium Grid never became ready."
          docker logs selenium-hub || true
          docker logs chrome || true
          exit 1
        fi

  build:
    commands:
      - echo "===== Running Selenium Tests ====="
      - mvn clean test

  post_build:
    commands:
      - echo "===== Stopping Selenium Grid ====="
      - docker compose down -v

artifacts:
  files:
    - test-output/**/*
    - ExtentReports/**/*
